name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential lua5.1 luarocks

      - name: Install Lua dependencies
        run: sudo luarocks install luacheck 1.2.0-1

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.3.1
          args: false

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint_luacheck

  test:
    name: Test ${{ matrix.os }} / Neovim ${{ matrix.nvim_version }}
    needs: lint
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        nvim_version:
          - v0.11.7
          - v0.12.1
        experimental:
          - false
        include:
          - os: ubuntu-latest
            nvim_version: nightly
            experimental: true
          - os: macos-latest
            nvim_version: nightly
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Restore test dependency cache
        if: ${{ !matrix.experimental }}
        uses: actions/cache@v5
        with:
          path: .test-deps
          key: >-
            ${{ runner.os }}-${{ runner.arch }}-nvim-${{ matrix.nvim_version }}-${{
            hashFiles('Makefile')
            }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nvim-${{ matrix.nvim_version }}-

      - name: Test
        run: make test NVIM_VERSION=${{ matrix.nvim_version }}
